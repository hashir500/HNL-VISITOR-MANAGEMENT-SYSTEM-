{% extends "base.html" %}

{% block title %}
Delete Employee
{% endblock %}

{% block content %}

<div class="card shadow-sm">
    <div class="card-body">

        <h3 class="text-danger">Delete Employee</h3>

        <p class="mt-3">
            Are you sure you want to delete
            <strong>{{ employee.employee_name }}</strong>?
        </p>

        <form method="POST">
            {% csrf_token %}

            <button type="submit" class="btn btn-danger">
                Delete
            </button>

            <a href="{% url 'employee_list' %}" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>
</div>

{% endblock %}
