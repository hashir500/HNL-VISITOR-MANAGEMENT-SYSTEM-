<!DOCTYPE html>
<html>
<head>
    <title>{% if dept %}Edit{% else %}Add{% endif %} Department</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <h2>{% if dept %}Edit{% else %}Add{% endif %} Department</h2>

        <form method="POST" class="mt-4">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Department Name</label>
                <input 
                    type="text" 
                    name="department_name" 
                    class="form-control" 
                    value="{% if dept %}{{ dept.department_name }}{% endif %}"
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary">Save Department</button>
            <a href="{% url 'department_list' %}" class="btn btn-secondary">Back</a>
        </form>
    </div>
</body>
</html>
