{% extends "base.html" %}

{% block title %}
{% if employee %}Edit Employee{% else %}Add Employee{% endif %}
{% endblock %}

{% block content %}

<h2>{% if employee %}Edit Employee{% else %}Add Employee{% endif %}</h2>

<form method="POST" class="mt-4">
    {% csrf_token %}

    <input type="text" name="employee_name" class="form-control mb-3" placeholder="Employee Name"
           value="{% if employee %}{{ employee.employee_name }}{% endif %}" required>

    <input type="email" name="employee_email" class="form-control mb-3" placeholder="Email"
           value="{% if employee %}{{ employee.employee_email }}{% endif %}" required>

    <input type="text" name="employee_phone" class="form-control mb-3" placeholder="Phone"
           value="{% if employee %}{{ employee.employee_phone }}{% endif %}" required>

    <input type="text" name="employee_cnic" class="form-control mb-3" placeholder="CNIC"
           value="{% if employee %}{{ employee.employee_cnic }}{% endif %}" required>

    <input type="text" name="employee_designation" class="form-control mb-3" placeholder="Designation"
           value="{% if employee %}{{ employee.employee_designation }}{% endif %}" required>

    <select name="employee_department" class="form-control mb-3" required>
        {% for dept in departments %}
            <option value="{{ dept.department_id }}"
                {% if employee and employee.employee_department.department_id == dept.department_id %}selected{% endif %}>
                {{ dept.department_name }}
            </option>
        {% endfor %}
    </select>

    <button type="submit" class="btn btn-primary">Save Employee</button>
    <a href="{% url 'employee_list' %}" class="btn btn-secondary">Back</a>
</form>

{% endblock %}
